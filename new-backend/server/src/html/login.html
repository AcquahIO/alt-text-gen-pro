<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alt Text Generator Pro – Sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #f3f4f6;
    }
    .container {
      max-width: 400px;
      margin: 4rem auto;
      background: #fff;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(15, 23, 42, 0.12);
    }
    h1 { margin-top: 0; font-size: 1.5rem; text-align: center; }
    button, input { font: inherit; }
    .btn {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .btn-google { background: #1a73e8; color: white; }
    .btn-secondary { background: #0f172a; color: white; }
    form { display: grid; gap: 0.75rem; }
    label { font-size: 0.9rem; font-weight: 600; }
    input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid #cbd5f5;
      border-radius: 10px;
    }
    .note { font-size: 0.8rem; color: #475569; }
    .toggle { text-align: center; margin-top: 0.75rem; font-size: 0.9rem; }
    .toggle button { background: none; border: none; color: #1a73e8; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Alt Text Generator Pro</h1>
    <form action="/auth/google" method="GET">
      <input type="hidden" name="redirect_uri" value="{{REDIRECT_URI}}">
      <input type="hidden" name="state" value="{{STATE}}">
      <button type="submit" class="btn btn-google">Continue with Google</button>
    </form>

    <div class="note">or sign in with your email address</div>

    <form id="email-form" method="POST" action="/auth/login/email">
      <input type="hidden" name="redirect_uri" value="{{REDIRECT_URI}}">
      <input type="hidden" name="state" value="{{STATE}}">
      <label for="email">Email address</label>
      <input id="email" name="email" type="email" required autocomplete="email">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" minlength="8" required autocomplete="current-password">
      <button type="submit" class="btn btn-secondary" id="email-submit">Sign in</button>
      <div class="note">
        Passwords are hashed with Argon2id. Need an account? switch below.
      </div>
      <div class="toggle">
        <span id="toggle-text">Need an account?</span>
        <button type="button" id="toggle-btn">Create one</button>
      </div>
    </form>
  </div>

  <script>
    const form = document.getElementById('email-form');
    const toggleBtn = document.getElementById('toggle-btn');
    const toggleText = document.getElementById('toggle-text');
    const submitBtn = document.getElementById('email-submit');
    let registering = false;

    function updateMode() {
      if (registering) {
        form.action = '/auth/register/email';
        submitBtn.textContent = 'Create account';
        toggleText.textContent = 'Already have an account?';
        toggleBtn.textContent = 'Sign in';
      } else {
        form.action = '/auth/login/email';
        submitBtn.textContent = 'Sign in';
        toggleText.textContent = 'Need an account?';
        toggleBtn.textContent = 'Create one';
      }
    }

    toggleBtn.addEventListener('click', () => {
      registering = !registering;
      updateMode();
    });

    updateMode();
  </script>
</body>
</html>
